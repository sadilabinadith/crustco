# Application Name
spring.application.name=bakery

# ============================================================
# DATABASE CONFIGURATION - MySQL
# ============================================================
spring.datasource.url=jdbc:mysql://localhost:3306/bakery_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=Bina@2026s
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================================
# JPA / HIBERNATE CONFIGURATION
# ============================================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ============================================================
# JSP VIEW RESOLVER CONFIGURATION
# ============================================================
# Prefix - where your JSP files are located
spring.mvc.view.prefix=/WEB-INF/views/
# Suffix - file extension for JSP files
spring.mvc.view.suffix=.jsp

# ============================================================
# SERVER CONFIGURATION
# ============================================================
server.port=8080
server.servlet.context-path=/
server.error.whitelabel.enabled=false
server.jsp-servlet.init-parameters.development=true

# ============================================================
# STATIC RESOURCES
# ============================================================
spring.web.resources.add-mappings=true
spring.web.resources.static-locations=classpath:/static/,classpath:/public/,classpath:/resources/

# ============================================================
# JSP SERVLET CONFIGURATION
# ============================================================
# Enable JSP support
spring.mvc.servlet.load-on-startup=1

# ============================================================
# THYMELEAF (DISABLED - Using JSP)
# ============================================================
spring.thymeleaf.enabled=false

# ============================================================
# LOGGING (Optional - for debugging)
# ============================================================
logging.level.org.springframework.web=INFO
logging.level.org.hibernate=WARN
logging.level.com.example.bakery=DEBUG